name: Monitor de Lançamentos Imobiliários

on:

  schedule:

    - cron: '0 12 * * *' # Roda às 09h00 (Horário de Brasília) diariamente

  workflow_dispatch:

jobs:

  check-site:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout do repositório
        uses: actions/checkout@v3

      - name: Configurar o Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: pip install requests pandas lxml

      - name: Rodar o script de monitoramento
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commitar base de dados atualizada
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add lancamentos.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "bot: atualiza base de lançamentos imobiliários"
          git push
