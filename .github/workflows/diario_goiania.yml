name: Monitor do Diário Oficial de Goiânia

on:
  schedule:
    # 19:00 UTC equivale a 16:00 no Horário de Brasília
    - cron: '0 19 * * *'
  workflow_dispatch:

jobs:
  analisa-pdf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências (pypdf para leitura de PDF)
        run: pip install requests beautifulsoup4 pypdf

      - name: Rodar o leitor do Diário Oficial
        env:
          # Credenciais inseridas diretamente
          TELEGRAM_TOKEN: '8742745705:AAERGnwZjSXNOKNR785v_fFM-PNm6GZQ3g8'
          TELEGRAM_CHAT_ID: '-1003531859481'
        run: python monitor_diario.py

      - name: Salvar o controle do último diário lido
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultimo_diario.txt
          git diff --quiet && git diff --staged --quiet || git commit -m "bot: registra ultimo diario lido"
          git pull --rebase
          git push
