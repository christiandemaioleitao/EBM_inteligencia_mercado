name: Monitor do Diário Oficial de Goiânia

on:
  schedule:
    - cron: '0 12 * * *' # Roda às 09h00 (Horário de Brasília)
  workflow_dispatch:

jobs:
  check-site:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essencial para o bot salvar o arquivo .txt
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar o Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 pypdf google-generativeai pandas lxml

      - name: Rodar o script de monitoramento
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python monitor_diario.py # Certifique-se de que o nome do arquivo seja monitor.py

      - name: Commitar base de dados atualizada
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # Adiciona tanto o .txt quanto um possível .csv se você usar
          git add ultimo_diario.txt
          git diff --staged --quiet || (git commit -m "bot: atualiza controle de leitura" && git push)
